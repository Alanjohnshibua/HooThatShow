openapi: 3.0.3
info:
  title: HooThatShow API
  version: "1.0"
servers:
  - url: http://localhost:8000
paths:
  /api/v1/auth/register:
    post:
      summary: Register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
              required: [email, password]
      responses:
        "201":
          description: Created
  /api/v1/auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
              required: [email, password]
      responses:
        "200":
          description: Tokens
  /api/v1/analyze:
    post:
      summary: Analyze title
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                sources:
                  type: array
                  items: { type: string }
                force_refresh: { type: boolean }
              required: [title]
      responses:
        "202":
          description: Queued
  /api/v1/analyze/{id}:
    get:
      summary: Analysis status
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Result
  /api/v1/history:
    get:
      summary: History
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
